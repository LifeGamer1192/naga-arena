<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NAGA ARENA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- TITLE -->
    <section id="screen-title" class="screen active">
      <h1 class="logo">NAGA<span>ARENA</span></h1>
      <p class="tagline">Slither, eat frogs, survive &mdash; endless arena</p>
      <input id="name-input" class="name-input" maxlength="16" placeholder="Your name" />
      <input id="room-input" class="name-input" maxlength="8" placeholder="Room code (optional)" autocomplete="off" autocapitalize="characters" />
      <div class="config-group">
        <span class="config-title">MAP</span>
        <div class="opt-row" id="map-options"></div>
      </div>
      <div class="config-group">
        <span class="config-title">BOTS</span>
        <div class="opt-row" id="bot-options"></div>
      </div>
      <div class="config-group">
        <span class="config-title">MODE</span>
        <div class="opt-row" id="mode-options"></div>
      </div>
      <button id="btn-play" class="btn primary">PLAY</button>
      <div class="title-actions">
        <button id="btn-copy" class="btn small">Copy invite link</button>
        <button id="btn-sound" class="btn small">SOUND: ON</button>
      </div>
      <p class="hint small">Steer with the mouse, or arrow keys / WASD (diagonals too). On mobile, drag.<br>
        Your own tail is safe; touching another snake is fatal. You respawn after a few seconds.</p>
      <p class="conn" id="conn-status">Connecting...</p>
    </section>

    <!-- GAME -->
    <section id="screen-game" class="screen">
      <canvas id="board"></canvas>
      <div id="net-status" class="net-status hidden"></div>
      <div id="hud" class="hud">
        <div id="you-stats" class="you-stats"></div>
        <div id="leaders" class="leaders"></div>
      </div>
      <div id="respawn" class="respawn hidden"></div>
      <div id="killlog" class="killlog"></div>
    </section>
  </div>

  <script src="client.js"></script>
</body>
</html>
